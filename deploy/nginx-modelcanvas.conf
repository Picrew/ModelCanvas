location = /modelcanvas {
    proxy_pass http://127.0.0.1:3002;
    include proxy_params;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
}

location ^~ /modelcanvas/ {
    proxy_pass http://127.0.0.1:3002;
    include proxy_params;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
}
