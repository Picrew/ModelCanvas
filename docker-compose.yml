services:
  office-converter:
    build: ./services/office-converter
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MAX_UPLOAD_BYTES: "25000000"
      CONVERSION_TIMEOUT_SECONDS: "45"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 3s
      retries: 4
